        body {

        }
        .ascii-container {
            text-shadow: 0 0 5px rgba(74, 222, 128, 0.4);
        }
        /* Custom scrollbar for aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>

        </header>

        <main id="creature-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6">
            <!-- Creatures will be injected here via JavaScript -->

                ]

        const gridElement = document.getElementById('creature-grid');

        // Initialize and render the creatures
        creatures.forEach((creature, index) => {
            // Create container for the card
            const card = document.createElement('div');
            card.className = "bg-slate-800 border border-slate-700 rounded-xl p-4 flex flex-col items-center justify-center transform transition-transform hover:scale-105 hover:border-emerald-500 hover:shadow-lg hover:shadow-emerald-900/50 shadow-md";

            // Create title
            const title = document.createElement('h2');
            title.className = "text-xs font-bold text-slate-300 uppercase tracking-widest mb-4 border-b border-slate-600 pb-1 w-full text-center";
            title.innerText = creature.name;

            // Create preformatted text block for ASCII art
            const pre = document.createElement('pre');
            pre.className = "ascii-container font-mono text-sm md:text-base whitespace-pre leading-snug flex items-center justify-center min-h-[120px]";
            pre.id = `creature-art-${index}`;
            pre.innerText = creature.frames[0]; // Set initial frame

            // Assemble card
            card.appendChild(title);
            card.appendChild(pre);
            gridElement.appendChild(card);

            // Start animation loop for this specific creature
            let currentFrame = 0;
            setInterval(() => {
                currentFrame = (currentFrame + 1) % creature.frames.length;
                document.getElementById(`creature-art-${index}`).innerText = creature.frames[currentFrame];
            }, creature.speed);
        });

</body>
</html>
