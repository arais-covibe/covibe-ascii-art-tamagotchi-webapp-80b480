<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII Companion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    :root {
      --green:   #4ade80;
      --dim:     #166534;
      --bg:      #080d08;
      --surface: #0c150c;
      --border:  #1a2e1a;
      --text:    #86efac;
      --muted:   #4b5563;
      --red:     #f87171;
      --yellow:  #fbbf24;
      --blue:    #60a5fa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      min-height: 100vh;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .glow { text-shadow: 0 0 8px rgba(74,222,128,0.5); }

    /* ── Pet art ── */
    #pet-art {
      font-family: 'Share Tech Mono', monospace;
      font-size: 2.1rem;
      line-height: 1.4;
      white-space: pre;
      color: var(--green);
      text-shadow: 0 0 14px rgba(74,222,128,0.85), 0 0 30px rgba(74,222,128,0.3);
      min-height: 5.8rem;
      display: block;
      text-align: center;
      transition: color 0.4s;
    }

    /* ── CRT bezel around pet ── */
    #pet-stage-bezel {
      background: #050a05;
      border: 2px solid var(--dim);
      border-radius: 12px;
      padding: 1.2rem 1.4rem;
      position: relative;
      box-shadow:
        inset 0 0 30px rgba(0,0,0,0.7),
        0 0 0 1px rgba(74,222,128,0.08),
        0 0 18px rgba(74,222,128,0.06);
      overflow: hidden;
    }
    #pet-stage-bezel::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 4px
      );
      pointer-events: none;
      border-radius: inherit;
    }
    /* corner dots */
    #pet-stage-bezel::after {
      content: '· · · ·';
      position: absolute;
      bottom: 4px;
      right: 8px;
      font-size: 0.55rem;
      color: var(--dim);
      letter-spacing: 3px;
    }

    /* ── Speech bubble ── */
    #speech-bubble {
      position: relative;
      background: rgba(12,21,12,0.95);
      border: 1px solid rgba(74,222,128,0.25);
      border-radius: 8px;
      padding: 0.55rem 0.85rem;
      font-size: 0.82rem;
      color: var(--green);
      min-height: 2.4rem;
      line-height: 1.5;
      word-break: break-word;
      box-shadow: 0 0 10px rgba(74,222,128,0.07);
    }
    #speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -9px;
      left: 28px;
      border-width: 9px 6px 0 6px;
      border-style: solid;
      border-color: rgba(74,222,128,0.25) transparent transparent transparent;
    }

    /* ── Status dot ── */
    .dot { width:7px; height:7px; border-radius:50%; display:inline-block; flex-shrink:0; }
    .dot.on  { background:var(--green); box-shadow:0 0 5px var(--green); animation:pulse 2s infinite; }
    .dot.off { background:var(--muted); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* ── Mood badge ── */
    #companion-mood {
      padding: 0.2rem 0.6rem;
      border-radius: 99px;
      background: rgba(74,222,128,0.1);
      border: 1px solid var(--dim);
      font-size: 0.7rem;
      color: var(--green);
      text-transform: capitalize;
      letter-spacing: 0.08em;
    }

    /* ── Stat bars ── */
    .stat-bar-track {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .stat-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease, background 0.6s ease;
      box-shadow: 0 0 6px currentColor;
    }

    /* ── Buttons ── */
    button, .btn {
      font-family: inherit;
      cursor: pointer;
    }
    .btn-primary {
      background: transparent;
      border: 1px solid var(--dim);
      color: var(--green);
      font-family: inherit;
      font-size: 0.78rem;
      padding: 0.35rem 0.7rem;
      border-radius: 4px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-primary:hover {
      background: rgba(74,222,128,0.08);
      border-color: var(--green);
      box-shadow: 0 0 8px rgba(74,222,128,0.15);
    }

    /* ── Input ── */
    .txt-input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--green);
      font-family: inherit;
      font-size: 0.82rem;
      padding: 0.38rem 0.6rem;
      border-radius: 4px;
      outline: none;
      flex: 1;
    }
    .txt-input:focus { border-color: var(--dim); }
    .txt-input::placeholder { color: var(--muted); }

    /* ── Activity feed items ── */
    .feed-item {
      border-left: 2px solid var(--border);
      padding: 0.3rem 0.5rem;
      font-size: 0.73rem;
      color: var(--muted);
      line-height: 1.4;
      animation: fadeSlide 0.3s ease;
    }
    .feed-item.fresh {
      border-left-color: var(--green);
      color: var(--text);
    }
    @keyframes fadeSlide { from{opacity:0;transform:translateX(-4px)} to{opacity:1} }

    /* ── Watch list items ── */
    .watch-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.6rem;
      background: rgba(26,46,26,0.4);
      border-radius: 4px;
      font-size: 0.75rem;
    }
    .watch-item .label { flex: 1; color: var(--text); }
    .watch-item .type  { color: var(--muted); font-size: 0.68rem; }
    .watch-item .active-badge { color: var(--green); font-size: 0.65rem; }

    /* ── Scanlines ── */
    .scanlines {
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
    }

    /* ── Blink ── */
    .blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 50%{opacity:0} }

    /* ── Section card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem;
    }
    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    /* ── Override Codex inline styles for watch list ── */
    #watch-list li {
      background: rgba(26,46,26,0.4) !important;
      border-radius: 4px !important;
      padding: 0.4rem 0.6rem !important;
      color: var(--text) !important;
      font-size: 0.75rem !important;
      box-shadow: none !important;
    }
    #watch-list li * { color: inherit !important; font-family: inherit !important; font-size: inherit !important; background: none !important; box-shadow: none !important; }
    #watch-list button[data-remove-watch] {
      background: rgba(248,113,113,0.12) !important;
      color: var(--red) !important;
      border: 1px solid rgba(248,113,113,0.3) !important;
      border-radius: 3px !important;
      padding: 0.15rem 0.4rem !important;
      font-size: 0.65rem !important;
      cursor: pointer !important;
    }
    #watch-list button[data-set-active] { font-weight: 600 !important; }
    #watch-list span[style*="color:#86efac"] { color: var(--green) !important; font-size: 0.65rem !important; }

    /* ── Activity feed override ── */
    #activity-feed li {
      padding: 0.4rem 0.6rem !important;
      border-radius: 4px !important;
      background: none !important;
      font-size: 0.73rem !important;
      color: var(--muted) !important;
      border-left: 2px solid var(--border) !important;
      box-shadow: none !important;
      animation: fadeSlide 0.3s ease !important;
    }
    #activity-feed li strong { color: var(--text) !important; font-weight: normal !important; text-transform: none !important; }
    #activity-feed li p { margin: 0.2rem 0 0 !important; color: var(--muted) !important; font-size: 0.68rem !important; }

    /* ── Responsive pet art ── */
    @media (max-width: 380px) {
      #pet-art { font-size: 0.95rem; }
    }

    /* ── Responsive layout ── */
    @media (max-width: 480px) {
      body { font-size: 14px; }
      .card { padding: 0.75rem; }
    }
  </style>
</head>
<body>

<div class="w-full max-w-3xl mx-auto px-4 py-5" id="app-layout">

  <!-- Header -->
  <header class="text-center pb-2">
    <h1 class="text-lg tracking-widest text-emerald-400 glow font-bold">ASCII COMPANION</h1>
    <p class="text-xs mt-0.5" style="color:var(--muted)">your github dev buddy</p>
  </header>

  <div class="flex flex-col md:flex-row gap-3 items-start">

  <!-- ══ LEFT COLUMN: pet ══ -->
  <div class="flex flex-col gap-3 w-full md:w-80 md:flex-shrink-0">

  <!-- ══════════════════════════════════════
       PET STAGE  (animation owned by agent_a)
       ══════════════════════════════════════ -->
  <div class="card scanlines flex flex-col gap-3">

    <!-- top bar: name + mood -->
    <div class="flex justify-between items-center">
      <span id="companion-name" class="text-xs tracking-widest" style="color:var(--dim)">ASCII COMPANION</span>
      <span id="companion-mood">idle</span>
    </div>

    <!-- speech bubble -->
    <div id="speech-bubble">
      <span id="reaction-text">waiting for activity<span class="blink">_</span></span>
    </div>

    <!-- ASCII pet in CRT bezel -->
    <div id="pet-stage-bezel" class="flex justify-center items-center">
      <pre id="pet-art">  ____
 / o o\
 \____/ </pre>
    </div>

    <!-- stats row -->
    <div class="grid grid-cols-3 gap-2 text-xs" style="color:var(--muted)">
      <div class="flex flex-col gap-1">
        <span>excitement</span>
        <div class="stat-bar-track">
          <div id="bar-excitement" class="stat-bar-fill" style="width:50%;background:var(--green)"></div>
        </div>
        <span id="stat-excitement" style="color:var(--text)">50</span>
      </div>
      <div class="flex flex-col gap-1">
        <span>social</span>
        <div class="stat-bar-track">
          <div id="bar-social" class="stat-bar-fill" style="width:50%;background:var(--blue)"></div>
        </div>
        <span id="stat-social" style="color:var(--text)">50</span>
      </div>
      <div class="flex flex-col gap-1">
        <span>focus</span>
        <div class="stat-bar-track">
          <div id="bar-focus" class="stat-bar-fill" style="width:50%;background:var(--yellow)"></div>
        </div>
        <span id="stat-focus" style="color:var(--text)">50</span>
      </div>
    </div>
  </div>

  </div><!-- end left column -->

  <!-- ══ RIGHT COLUMN: controls + feed ══ -->
  <div class="flex flex-col gap-3 flex-1 min-w-0">

  <!-- ══════════════════════════════════════
       GITHUB CONNECT
       ══════════════════════════════════════ -->
  <div class="card flex flex-col gap-2">
    <div class="section-label">— github connect —</div>
    <div class="flex gap-2 items-center">
      <span class="dot off" id="status-dot"></span>
      <span class="text-xs" style="color:var(--muted)" id="status-label">not connected</span>
    </div>
    <div class="flex gap-2">
      <input id="github-username-input" class="txt-input" type="text" placeholder="your github username..." autocomplete="off" spellcheck="false" />
      <button id="connect-btn" class="btn-primary">connect</button>
    </div>
    <div id="connect-error" class="text-xs hidden" style="color:var(--red)"></div>
  </div>

  <!-- ══════════════════════════════════════
       WATCH LIST  (wired by agent_b / app.js)
       ══════════════════════════════════════ -->
  <div class="card" id="runtime-root">
    <div class="section-label">— watch list —</div>

    <form id="watch-form" class="flex gap-2 mb-3">
      <input id="watch-input" class="txt-input" type="text" placeholder="owner/repo or label" autocomplete="off" />
      <button type="submit" class="btn-primary">add</button>
    </form>

    <ul id="watch-list" class="flex flex-col gap-1 mb-3">
      <li class="text-xs" style="color:var(--muted)">no watches yet</li>
    </ul>

    <button id="simulate-event" class="btn-primary w-full mb-2">⚡ simulate event</button>

    <div class="flex gap-2">
      <button id="export-state" class="btn-primary flex-1">↑ export</button>
      <label class="btn-primary flex-1 text-center cursor-pointer">
        ↓ import
        <input id="import-state" type="file" accept="application/json" class="hidden" />
      </label>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       ACTIVITY FEED  (wired by agent_b)
       ══════════════════════════════════════ -->
  <div class="card">
    <div class="section-label">— activity feed —</div>
    <ul id="activity-feed" class="flex flex-col gap-1 max-h-44 overflow-y-auto">
      <li class="feed-item">no events yet<span class="blink">_</span></li>
    </ul>
  </div>

  </div><!-- end right column -->
  </div><!-- end flex row -->

  <!-- Footer -->
  <footer class="text-center text-xs pb-2 pt-1" style="color:var(--muted)">
    <span id="poll-status">polling paused</span>
  </footer>

</div>

<!-- ══════════════════════════════════════
     ANIMATION BRIDGE  (agent_a)
     Watches mood changes from app.js and drives the ASCII pet.
     ══════════════════════════════════════ -->
<script type="module">
  import {
    startAnimation,
    getPassiveMood,
    getMoodForEvent,
    getReactionText,
    triggerReaction,
  } from './animations.js';

  const art = document.getElementById('pet-art');
  const moodBadge = document.getElementById('companion-mood');

  let currentStop = startAnimation(art, 'greeting');
  let currentMood = 'greeting';

  // Sync stat bars with numeric values
  function syncBars() {
    const vals = {
      excitement: parseFloat(document.getElementById('stat-excitement')?.textContent || '50'),
      social:     parseFloat(document.getElementById('stat-social')?.textContent || '50'),
      focus:      parseFloat(document.getElementById('stat-focus')?.textContent || '50'),
    };
    const pct = v => Math.max(0, Math.min(100, v)) + '%';
    const barE = document.getElementById('bar-excitement');
    const barS = document.getElementById('bar-social');
    const barF = document.getElementById('bar-focus');
    if (barE) { barE.style.width = pct(vals.excitement); barE.style.background = vals.excitement > 60 ? 'var(--green)' : vals.excitement > 30 ? 'var(--yellow)' : 'var(--red)'; }
    if (barS) { barS.style.width = pct(vals.social); barS.style.background = vals.social > 60 ? 'var(--blue)' : vals.social > 30 ? 'var(--yellow)' : 'var(--red)'; }
    if (barF) { barF.style.width = pct(vals.focus); barF.style.background = vals.focus > 60 ? 'var(--yellow)' : vals.focus > 30 ? 'var(--green)' : 'var(--red)'; }
  }

  // Change the pet animation to match a new mood key
  function changeMood(moodKey) {
    if (moodKey === currentMood) return;
    if (currentStop) currentStop();
    currentMood = moodKey;
    currentStop = startAnimation(art, moodKey);
    if (moodBadge) moodBadge.textContent = moodKey;
    syncBars();
  }

  // Expose a hook for app.js to call:
  //   window.petReact(eventType, reactionText)
  window.petReact = function(eventType, reactionText) {
    const mood = getMoodForEvent(eventType);
    const text = reactionText || getReactionText(eventType);
    const reactionEl = document.getElementById('reaction-text');
    if (reactionEl) reactionEl.textContent = text;

    if (currentStop) currentStop();
    triggerReaction(art, mood, 3000, getPassiveMood(0), (stop) => {
      currentStop = stop;
      currentMood = getPassiveMood(0);
      if (moodBadge) moodBadge.textContent = currentMood;
      syncBars();
    });
    currentMood = mood;
  };

  // Expose mood change for app.js passive state updates:
  //   window.petSetMood(moodKey)
  window.petSetMood = changeMood;

  // Poll for mood changes via companion-mood badge mutations
  const observer = new MutationObserver(() => {
    const mood = moodBadge?.textContent?.trim()?.toLowerCase();
    if (mood && mood !== currentMood) {
      changeMood(mood);
    }
    syncBars();
  });
  if (moodBadge) observer.observe(moodBadge, { childList: true, characterData: true, subtree: true });

  // Passive mood after 2s if no events
  setTimeout(() => {
    if (currentMood === 'greeting') {
      changeMood(getPassiveMood(60));
    }
  }, 2000);

  // Sync bars on stat updates
  new MutationObserver(syncBars).observe(document.body, { subtree: true, childList: true, characterData: true });
</script>

<!-- GitHub feed polling (agent_a) -->
<script type="module">
  import { startPolling, stopPolling } from './github-feed.js';

  const input  = document.getElementById('github-username-input');
  const btn    = document.getElementById('connect-btn');
  const errEl  = document.getElementById('connect-error');
  const dot    = document.getElementById('status-dot');
  const label  = document.getElementById('status-label');

  function getUsername() {
    return (input?.value || '').trim();
  }

  function connect() {
    const username = getUsername();
    if (!username) return;
    if (errEl) { errEl.textContent = ''; errEl.classList.add('hidden'); }
    startPolling(username, null);
    if (label) label.textContent = `watching @${username}`;
  }

  if (btn) btn.addEventListener('click', connect);
  if (input) input.addEventListener('keydown', e => { if (e.key === 'Enter') connect(); });

  // Auto-resume if username was saved
  const saved = localStorage.getItem('tamago_username');
  if (saved && input) {
    input.value = saved;
    connect();
  }

  // Persist username on connect
  if (input) input.addEventListener('change', () => {
    localStorage.setItem('tamago_username', input.value.trim());
  });
</script>

<!-- App wiring (owned by agent_b / Codex) -->
<script type="module" src="./app.js"></script>

</body>
</html>
